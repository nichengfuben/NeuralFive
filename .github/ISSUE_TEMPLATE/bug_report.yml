name: Bug Report
description: 报告一个问题或bug
title: "[BUG] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您报告bug！请填写以下信息以帮助我们更好地理解和解决问题。
  
  - type: checkboxes
    id: checklist
    attributes:
      label: 检查清单
      options:
        - label: 我已经搜索了现有的issues，确认这不是重复报告
          required: true
        - label: 我已经验证了这个问题在最新版本中仍然存在
          required: true
        - label: 我已经阅读了贡献指南
          required: true
  
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述问题
      placeholder: 描述发生了什么...
    validations:
      required: true
  
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 提供详细的复现步骤
      placeholder: |
        1. 启动程序...
        2. 点击...
        3. 观察到...
    validations:
      required: true
  
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 描述你期望发生什么
      placeholder: 描述期望的行为...
    validations:
      required: true
  
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 描述实际发生了什么
      placeholder: 描述实际的行为...
    validations:
      required: true
  
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 提供你的环境信息
      placeholder: |
        - 操作系统: [例如 Windows 11]
        - Python版本: [例如 3.11.0]
        - 项目版本: [例如 1.0.0]
        - 相关依赖版本: ...
    validations:
      required: true
  
  - type: textarea
    id: logs
    attributes:
      label: 错误日志
      description: 如果有错误日志，请提供
      placeholder: 粘贴错误日志...
      render: shell
  
  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如果适用，添加截图帮助解释问题
      placeholder: 拖拽截图到这里...
  
  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 添加任何其他相关信息
      placeholder: 任何其他信息...