name: Feature Request
description: 建议一个新功能或改进
title: "[FEATURE] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您提出功能建议！请填写以下信息以帮助我们更好地理解您的需求。
  
  - type: checkboxes
    id: checklist
    attributes:
      label: 检查清单
      options:
        - label: 我已经搜索了现有的issues，确认这不是重复建议
          required: true
        - label: 我已经阅读了贡献指南
          required: true
  
  - type: textarea
    id: problem
    attributes:
      label: 相关问题
      description: 这个功能请求是否解决了某个问题？请描述
      placeholder: 描述这个功能解决的问题...
    validations:
      required: true
  
  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 描述您期望的解决方案
      placeholder: 描述您期望的功能...
    validations:
      required: true
  
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 描述您考虑过的替代方案
      placeholder: 描述替代方案...
  
  - type: textarea
    id: usecase
    attributes:
      label: 使用场景
      description: 描述这个功能的使用场景
      placeholder: 描述具体的使用场景...
    validations:
      required: true
  
  - type: textarea
    id: benefits
    attributes:
      label: 预期收益
      description: 描述这个功能带来的好处
      placeholder: 描述预期的好处...
    validations:
      required: true
  
  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 您认为这个功能的重要程度
      options:
        - 低
        - 中
        - 高
        - 紧急
    validations:
      required: true
  
  - type: textarea
    id: implementation
    attributes:
      label: 实现建议
      description: 如果您有实现建议，请提供
      placeholder: 提供实现建议...
  
  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 添加任何其他相关信息
      placeholder: 任何其他信息...