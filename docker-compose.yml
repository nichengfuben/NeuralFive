version: '3.8'

services:
  neuralfive:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuralfive-app
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DISPLAY=${DISPLAY}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped

  neuralfive-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: neuralfive-dev
    ports:
      - "8001:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DEVELOPMENT=true
      - DISPLAY=${DISPLAY}
    volumes:
      - .:/app
      - ./logs:/app/logs
      - ./data:/app/data
    stdin_open: true
    tty: true
    restart: unless-stopped

  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: neuralfive-jupyter
    ports:
      - "8888:8888"
    environment:
      - PYTHONUNBUFFERED=1
      - JUPYTER_ENABLE_LAB=yes
    volumes:
      - .:/app
      - ./notebooks:/app/notebooks
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root
    restart: unless-stopped