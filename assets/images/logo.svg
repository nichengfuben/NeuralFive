<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="95" fill="#1e40af" stroke="#1e3a8a" stroke-width="2"/>
  
  <!-- 大脑图标 -->
  <path d="M60 80 Q80 60 100 80 Q120 60 140 80 Q140 100 130 120 Q120 140 100 140 Q80 140 70 120 Q60 100 60 80" 
        fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
  
  <!-- 神经网络节点 -->
  <circle cx="80" cy="90" r="3" fill="#1e40af"/>
  <circle cx="100" cy="85" r="3" fill="#1e40af"/>
  <circle cx="120" cy="90" r="3" fill="#1e40af"/>
  <circle cx="90" cy="110" r="3" fill="#1e40af"/>
  <circle cx="110" cy="110" r="3" fill="#1e40af"/>
  
  <!-- 连接线 -->
  <line x1="80" y1="90" x2="100" y2="85" stroke="#1e40af" stroke-width="1"/>
  <line x1="100" y1="85" x2="120" y2="90" stroke="#1e40af" stroke-width="1"/>
  <line x1="80" y1="90" x2="90" y2="110" stroke="#1e40af" stroke-width="1"/>
  <line x1="120" y1="90" x2="110" y2="110" stroke="#1e40af" stroke-width="1"/>
  <line x1="90" y1="110" x2="110" y2="110" stroke="#1e40af" stroke-width="1"/>
  
  <!-- 文字 -->
  <text x="100" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e40af">StrategicMind</text>
</svg>
